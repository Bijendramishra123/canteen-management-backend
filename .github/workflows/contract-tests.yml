name: Contract Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Start MongoDB
      run: |
        docker run -d --name mongodb -p 27017:27017 mongo:6

    - name: Start API
      run: |
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Check API Health
      run: |
        curl -f http://localhost:8000/ || (echo "API failed to start" && exit 1)

    - name: Run Specmatic Contract Tests
      run: |
        docker run --rm -v $(pwd):/work specmatic/specmatic test /work/openapi.json --host localhost --port 8000

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: specmatic-reports
        path: reports/