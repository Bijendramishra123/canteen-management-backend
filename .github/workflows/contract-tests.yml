name: Contract Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Start MongoDB
      run: |
        docker run -d --name mongodb -p 27017:27017 mongo:6

    - name: Build and Run API
      run: |
        docker build -t canteen-api .
        docker run -d --name api --network host -p 8000:8000 canteen-api

    - name: Wait for API
      run: |
        sleep 20
        curl -v http://localhost:8000/ || true

    - name: Check API Health
      run: |
        curl -f http://localhost:8000/ || (echo "API failed" && exit 1)

    - name: Run Specmatic Contract Tests
      run: |
        docker run --rm -v $(pwd):/work specmatic/specmatic test /work/openapi.json --host localhost --port 8000

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: specmatic-reports
        path: reports/
